name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Force the repo's Pages source to "GitHub Actions" (build_type: workflow)
      # using the workflow's own token, so no manual Settings → Pages toggle is
      # needed. PUT updates an existing site; POST creates one if absent.
      - name: Ensure Pages is served from GitHub Actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method PUT "repos/${{ github.repository }}/pages" -f build_type=workflow \
            || gh api --method POST "repos/${{ github.repository }}/pages" -f build_type=workflow \
            || echo "::warning::Could not set Pages build_type via API (may already be 'workflow', or org policy blocks it)."

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
